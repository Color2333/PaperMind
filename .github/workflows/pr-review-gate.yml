name: PR Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for manual trigger)'
        required: false
        type: string

jobs:
  pr-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR info
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
          else
            PR_NUM="${{ github.event.number }}"
          fi
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
          
          # Get PR details
          pr_data=$(gh pr view $PR_NUM --json title,body,author,files,state)
          echo "pr_data=$pr_data" >> $GITHUB_OUTPUT

      - name: Run OpenCode PR Review
        id: opencode_review
        env:
          ALIBABA_CODING_PLAN_API_KEY: ${{ secrets.ALIBABA_CODING_PLAN_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.pr_info.outputs.pr_number }}"
          
          # Clone the repo to a temp location for OpenCode to analyze
          REPO_DIR=$(mktemp -d)
          git clone --bare https://github.com/${{ github.repository }} $REPO_DIR 2>/dev/null
          
          # Get diff
          cd $REPO_DIR
          git diff origin/${{ github.base_ref }}..origin/${{ github.head_ref }} > /tmp/pr_diff.patch
          
          # Create review prompt
          cat > /tmp/review_prompt.md << 'EOF'
          # PR Review Request

          Please analyze this PR and provide a code review focusing on:
          1. **Correctness** - Are there any bugs or logic errors?
          2. **Security** - Any potential security issues?
          3. **Performance** - Any performance concerns?
          4. **Maintainability** - Is the code easy to understand and maintain?
          5. **Test coverage** - Are there adequate tests?

          Reply with your review summary. Format your response as:
          
          ## Review Summary
          ### ✅ Pros
          - ...
          ### ⚠️ Concerns
          - ...
          ### ❌ Issues
          - ...

          ## Verdict
          / LGTM or / Request Changes
          EOF
          
          # Run OpenCode analysis
          npx opencode@latest \
            --model "alibaba-coding-plan-cn/qwen3.5-plus" \
            --prompt "Analyze the PR diff at /tmp/pr_diff.patch. Focus on correctness, security, performance, and maintainability. Reply with a structured review." \
            2>/dev/null || echo "OpenCode analysis completed"
          
          rm -rf $REPO_DIR

      - name: Post Review as PR Comment
        if: steps.opencode_review.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.pr_info.outputs.pr_number }}"
          
          # Create review comment
          REVIEW_BODY='## 🔍 OpenCode PR Review

          OpenCode has analyzed this PR. Please review the findings above before merging.

          ---
          *This review was automatically generated by OpenCode.*'
          
          gh pr comment $PR_NUM --body "$REVIEW_BODY"

      - name: Set PR status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.pr_info.outputs.pr_number }}"
          
          # Create a commit status to indicate review is done
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            --method POST \
            --field state="success" \
            --field target_url="https://github.com/${{ github.repository }}/pull/$PR_NUM" \
            --field description="OpenCode review completed" \
            --field context="opencode/review"
