# PaperMind Docker Compose - 分离部署配置
# @author Color2333
#
# 端口规划：
# - 前端：3002
# - 后端：8002
#
# 使用方法:
#   1. cp .env.example .env && 编辑 .env 填入 API Key
#   2. docker compose up -d --build
#   3. 访问 http://localhost:3002

services:
  # ==========================================
  # 后端服务 (FastAPI)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: papermind-backend
    ports:
      - "8002:8000"  # 映射到 8002（避免 8001 冲突）
    volumes:
      - pm_data:/app/data
      - pm_logs:/app/logs
      - pm_pip_cache:/.pip-cache
    env_file:
      - ./.env
    environment:
      - APP_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - SITE_URL=https://pm.vibingu.cn
      - CORS_ALLOW_ORIGINS=http://localhost:3002,http://127.0.0.1:3002,https://pm.vibingu.cn
      - DEMO_MODE=false
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        # DATABASE_URL=sqlite://... 时 backend 不实际连 postgres，但 compose
        # 仍会拉起 postgres 容器，无副作用；切到 PG 后自动等待 ready
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # Worker 服务 (定时任务 + 闲时处理)
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: papermind-worker
    command: python -m apps.worker.main
    volumes:
      - pm_data:/app/data
      - pm_logs:/app/logs
      - pm_pip_cache:/.pip-cache
    env_file:
      - ./.env
    environment:
      - APP_ENV=production
      - SITE_URL=https://pm.vibingu.cn
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      # High 2e：改判时效而非仅文件存在——所有 job 失败时心跳不再写，文件过期即不健康。
      # 心跳超过 20 分钟（1200s）视为不健康（worker 卡死或全部任务失败）
      test: ["CMD", "python", "-m", "scripts.worker_healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # 数据库服务 (PostgreSQL + pgvector)
  # ==========================================
  # 镜像带 pgvector 扩展（即使当前不用 ANN 也已就绪）。
  # DATABASE_URL=sqlite://... 时 backend/worker 不会实际连接，但容器会启动占位；
  # 切到 postgresql+psycopg2://... 后即自动使用。
  postgres:
    image: pgvector/pgvector:pg16
    container_name: papermind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: papermind
      POSTGRES_USER: papermind
      POSTGRES_PASSWORD: papermind
    ports:
      - "127.0.0.1:5432:5432"  # 只对宿主本地暴露，外部不直连
    volumes:
      - papermind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papermind -d papermind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 前端服务 (Nginx 托管静态文件)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: papermind-frontend
    ports:
      - "3002:80"  # 映射到 3002（避免 3001 冲突）
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

# ==========================================
# 数据卷定义（持久化存储）
# ==========================================
volumes:
  pm_data:
    name: papermind_data
  pm_logs:
    name: papermind_logs
  pm_pip_cache:
  papermind_pgdata:
    name: papermind_pgdata
